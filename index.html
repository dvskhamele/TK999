<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TK999 - Betting App</title>
    <link rel="icon" type="image/svg+xml" href="/vite.svg">
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
        min-height: 100vh;
      }
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      /* Add basic styles to ensure login button is visible if app doesn't load */
      .fallback-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        color: white;
        text-align: center;
        padding: 20px;
      }
      .login-btn {
        background: linear-gradient(135deg, #ff8c00, #ffd700);
        color: #1a1a1a;
        padding: 15px 30px;
        font-size: 18px;
        font-weight: bold;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        margin: 20px 0;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-block;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      }
      .login-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
        background: linear-gradient(135deg, #ffd700, #ff8c00);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Fallback content in case React doesn't load -->
      <div class="fallback-content">
        <h1>TK999 Betting Platform</h1>
        <p>Loading application...</p>
        <div style="border: 16px solid #f3f3f3; border-top: 16px solid #3498db; border-radius: 50%; width: 60px; height: 60px; animation: spin 2s linear infinite; margin: 20px auto;"></div>
        <p>If the app doesn't load, please refresh the page or check browser console for errors.</p>
      </div>
    </div>

    <!-- Load the main application script -->
    <script src="./assets/index-cwg3bxhf.js"></script>
    
    <script>
      // Wait for app to load and inject mock data
      window.addEventListener('load', function() {
        // Wait a bit for the app to initialize
        setTimeout(function() {
          // Mock user data
          const mockUser = {
            id: 1,
            name: "Demo User",
            email: "demo@tk999.com",
            balance: 1000,
            role: "user"
          };
          
          // Store in localStorage for the app to use
          localStorage.setItem('currentUser', JSON.stringify(mockUser));
          
          // Mock matches data
          const mockMatches = [
            {
              id: 1,
              teamA: "Brazil",
              teamB: "Argentina",
              date: new Date(Date.now() + 3600000).toISOString(),
              category: "Football",
              odds: { teamA: 2.1, draw: 3.2, teamB: 3.5 },
              status: "upcoming"
            },
            {
              id: 2,
              teamA: "Lakers",
              teamB: "Warriors", 
              date: new Date(Date.now() + 7200000).toISOString(),
              category: "Basketball",
              odds: { teamA: 1.9, draw: null, teamB: 1.95 },
              status: "upcoming"
            },
            {
              id: 3,
              teamA: "India",
              teamB: "Australia",
              date: new Date(Date.now() + 10800000).toISOString(),
              category: "Cricket",
              odds: { teamA: 1.8, draw: null, teamB: 2.1 },
              status: "upcoming"
            }
          ];
          
          localStorage.setItem('matches', JSON.stringify(mockMatches));
          localStorage.setItem('allMatches', JSON.stringify(mockMatches));
          
          // Trigger storage event to notify the app of new data
          if (window.dispatchEvent) {
            window.dispatchEvent(new Event('storage'));
          }
        }, 1000);
      });
    </script>
  </body>
</html>
