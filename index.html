<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TK999 - Betting App</title>
    <script type="module" crossorigin src="./assets/index-CCamSkAb.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-CmJebkS1.css">
    <style>
      #debug-info {
        position: fixed;
        top: 10px;
        right: 10px;
        background: rgba(0,0,0,0.8);
        color: white;
        padding: 10px;
        border-radius: 5px;
        z-index: 10000;
        font-family: monospace;
        font-size: 12px;
        max-width: 300px;
      }
      #debug-info h3 {
        margin: 0 0 5px 0;
        color: #4CAF50;
      }
      #debug-info p {
        margin: 2px 0;
      }
      #debug-info .error {
        color: #f44336;
      }
      #debug-info .warning {
        color: #ff9800;
      }
      #debug-info .success {
        color: #4CAF50;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- App will be mounted here by React -->
    </div>
    
    <script>
      // Inject mock data for the betting app to function properly
      window.addEventListener('load', function() {
        // Mock user data
        const mockUser = {
          id: 1,
          name: "Demo User",
          email: "demo@tk999.com",
          balance: 1000,
          role: "user",
          betHistory: []
        };
        
        // Store in localStorage for the app to use
        localStorage.setItem('user', JSON.stringify(mockUser));
        localStorage.setItem('currentUser', JSON.stringify(mockUser));
        
        // Mock matches data
        const mockMatches = [
          {
            id: 1,
            teamA: "Brazil",
            teamB: "Argentina",
            date: new Date(Date.now() + 3600000).toISOString(),
            category: "Football",
            odds: { teamA: 2.1, draw: 3.2, teamB: 3.5 },
            status: "upcoming"
          },
          {
            id: 2,
            teamA: "Lakers",
            teamB: "Warriors", 
            date: new Date(Date.now() + 7200000).toISOString(),
            category: "Basketball",
            odds: { teamA: 1.9, draw: null, teamB: 1.95 },
            status: "upcoming"
          },
          {
            id: 3,
            teamA: "India",
            teamB: "Australia",
            date: new Date(Date.now() + 10800000).toISOString(),
            category: "Cricket",
            odds: { teamA: 1.8, draw: null, teamB: 2.1 },
            status: "upcoming"
          },
          {
            id: 4,
            teamA: "Real Madrid",
            teamB: "Barcelona",
            date: new Date(Date.now() + 14400000).toISOString(),
            category: "Football",
            odds: { teamA: 2.4, draw: 3.1, teamB: 2.8 },
            status: "upcoming"
          }
        ];
        
        // Store matches in localStorage
        localStorage.setItem('matches', JSON.stringify(mockMatches));
        localStorage.setItem('allMatches', JSON.stringify(mockMatches));
        
        // Mock bets data
        const mockBets = [
          {
            id: 1,
            userId: 1,
            matchId: 1,
            teamChosen: "Brazil",
            amount: 100,
            potentialWin: 210,
            status: "pending"
          }
        ];
        
        localStorage.setItem('bets', JSON.stringify(mockBets));
        
        // Trigger storage event to notify app of new data
        if (window.dispatchEvent) {
          window.dispatchEvent(new Event('storage'));
        }
      });
    </script>
  </body>
</html>
